<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Top-Down RPG Game</title>
    <style>
        body { background-color: #f0f0f0; }
        canvas { border: 1px solid #000; display: block; margin: 0 auto; }
        .controls { text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="controls">
        <button id="moveUp">Up</button>
        <button id="moveDown">Down</button>
        <button id="moveLeft">Left</button>
        <button id="moveRight">Right</button>
        <button id="attack">Attack</button>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let player = { x: 400, y: 300, size: 20, color: 'blue' };
        let enemies = [];
        let level = 1;

        function drawPlayer() {
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);
        }

        function spawnEnemies(count) {
            for (let i = 0; i < count; i++) {
                enemies.push({
                    x: Math.random() * (canvas.width - 20),
                    y: Math.random() * (canvas.height - 20),
                    size: 20,
                    color: 'red'
                });
            }
        }

        function drawEnemies() {
            enemies.forEach(enemy => {
                ctx.fillStyle = enemy.color;
                ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);
            });
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPlayer();
            drawEnemies();
        }

        document.getElementById('moveUp').onclick = () => { player.y -= 5; update(); };
        document.getElementById('moveDown').onclick = () => { player.y += 5; update(); };
        document.getElementById('moveLeft').onclick = () => { player.x -= 5; update(); };
        document.getElementById('moveRight').onclick = () => { player.x += 5; update(); };
        document.getElementById('attack').onclick = () => { alert('Attack!'); };

        spawnEnemies(level * 3);
        setInterval(update, 100);
    </script>
</body>
</html>
