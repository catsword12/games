<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Game</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #gameCanvas { border: 1px solid black; }
        #stats { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Welcome to the RPG Game</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="stats">
        <h2>Player Stats</h2>
        <p id="level">Level: 1</p>
        <p id="health">Health: 100</p>
        <p id="experience">Experience: 0</p>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let player = { level: 1, health: 100, experience: 0 };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Add game rendering logic here
        }

        function updateStats() {
            document.getElementById('level').innerText = `Level: ${player.level}`;
            document.getElementById('health').innerText = `Health: ${player.health}`;
            document.getElementById('experience').innerText = `Experience: ${player.experience}`;
        }

        function gameLoop() {
            draw();
            updateStats();
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', function(event) {
            // Add keyboard control logic here
            if (event.key === ' ') { // Example key for attack
                // Handle attack
            }
        });

        // Start the game loop
        gameLoop();
    </script>
</body>
</html>
