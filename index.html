<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RPG Template</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas" width="640" height="480"></canvas>

    <div id="hud">
      <div id="hp">HP: <span id="hp-val">100</span></div>
      <div id="gold">Gold: <span id="gold-val">0</span></div>
    </div>

    <div id="ui">
      <div id="dialog" class="panel hidden"></div>
      <div id="combat" class="panel hidden">
        <div id="combat-log"></div>
        <div id="combat-actions">
          <button id="btn-attack">Attack</button>
          <button id="btn-run">Run</button>
        </div>
      </div>
      <div id="inventory" class="panel hidden">
        <h3>Inventory</h3>
        <ul id="inv-list"></ul>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
